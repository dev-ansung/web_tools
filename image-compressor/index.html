<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Image Compressor</title>
  <link rel="stylesheet" href="../theme.css" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <div class="top-bar">
    <a class="back-link" href="../index.html">
      <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2"
           viewBox="0 0 24 24" stroke-linecap="round" stroke-linejoin="round">
        <polyline points="15 18 9 12 15 6"/>
      </svg>
      Tools
    </a>
    <h1>Image Compressor</h1>
  </div>

  <!-- Paste zone -->
  <input type="file" id="file-input" accept="image/*" style="display:none;" />
  <div id="paste-zone" tabindex="0">
    <svg class="paste-icon" width="32" height="32" fill="none" stroke="currentColor" stroke-width="1.5"
         viewBox="0 0 24 24" stroke-linecap="round" stroke-linejoin="round">
      <rect x="3" y="3" width="18" height="18" rx="2" ry="2"/>
      <circle cx="8.5" cy="8.5" r="1.5"/>
      <polyline points="21 15 16 10 5 21"/>
    </svg>
    <div class="paste-label">Click or Ctrl+V to add an image</div>
    <div class="paste-sub">or drag &amp; drop a file here</div>
  </div>

  <!-- Settings (shown after image load) -->
  <div id="settings">
    <div class="settings-row">

      <div class="field">
        <label>DIMENSION</label>
        <div class="field-row">
          <input type="range" id="dim-slider" min="5" max="100" value="100" step="5" />
          <span class="val-badge" id="dim-val">100%</span>
        </div>
      </div>

      <div class="field">
        <label>QUALITY</label>
        <div class="field-row">
          <input type="range" id="quality-slider" min="1" max="100" value="85" step="1" />
          <span class="val-badge" id="quality-val">85</span>
        </div>
      </div>

      <div class="field">
        <label>FORMAT</label>
        <div class="format-group">
          <button class="fmt-btn active" data-fmt="image/jpeg">JPEG</button>
          <button class="fmt-btn" data-fmt="image/webp">WebP</button>
          <button class="fmt-btn" data-fmt="image/png">PNG</button>
        </div>
      </div>

      <div class="field">
        <label>TARGET SIZE (KB)</label>
        <input type="number" class="size-input" id="target-input" placeholder="e.g. 1000 for Discord" min="1" value="1024" />
      </div>

      <div class="field" style="justify-content: flex-end;">
        <button class="auto-btn" id="auto-btn" disabled>Auto-fit Quality to Target</button>
      </div>

    </div>
  </div>

  <!-- Preview -->
  <div id="preview">
    <div class="preview-panels">
      <div class="panel">
        <div class="panel-header">
          <span class="panel-title">ORIGINAL</span>
          <span class="panel-meta" id="orig-size">—</span>
        </div>
        <img class="panel-img" id="orig-img" alt="Original" />
        <div class="panel-dims" id="orig-dims">—</div>
      </div>
      <div class="panel">
        <div class="panel-header">
          <span class="panel-title">COMPRESSED</span>
          <span class="panel-meta" id="comp-size">—</span>
        </div>
        <img class="panel-img" id="comp-img" alt="Compressed" />
        <div class="panel-dims" id="comp-dims">—</div>
      </div>
    </div>
  </div>

  <!-- Download bar -->
  <div id="download-bar">
    <button class="dl-btn" id="dl-btn">Download Compressed Image</button>
    <span class="savings-badge" id="savings-badge"></span>
  </div>

  <canvas id="canvas" style="display:none;"></canvas>

  <script>
  (function () {

    var origBitmap = null;   // ImageBitmap of the original
    var origBytes  = 0;
    var origW = 0, origH = 0;
    var origName = 'image';
    var currentDataUrl = null;
    var currentFmt = 'image/jpeg';
    var debounceTimer = null;

    var pasteZone   = document.getElementById('paste-zone');
    var fileInput   = document.getElementById('file-input');
    var settings    = document.getElementById('settings');
    var preview     = document.getElementById('preview');
    var downloadBar = document.getElementById('download-bar');
    var canvas      = document.getElementById('canvas');
    var ctx         = canvas.getContext('2d');

    var dimSlider     = document.getElementById('dim-slider');
    var dimVal        = document.getElementById('dim-val');
    var qualSlider    = document.getElementById('quality-slider');
    var qualVal       = document.getElementById('quality-val');
    var targetInput   = document.getElementById('target-input');
    var autoBtn       = document.getElementById('auto-btn');
    var origImg       = document.getElementById('orig-img');
    var compImg       = document.getElementById('comp-img');
    var origSizeEl    = document.getElementById('orig-size');
    var compSizeEl    = document.getElementById('comp-size');
    var origDimsEl    = document.getElementById('orig-dims');
    var compDimsEl    = document.getElementById('comp-dims');
    var dlBtn         = document.getElementById('dl-btn');
    var savingsBadge  = document.getElementById('savings-badge');

    // ── Format buttons ────────────────────────────────────────────────────────

    document.querySelectorAll('.fmt-btn').forEach(function (btn) {
      btn.addEventListener('click', function () {
        document.querySelectorAll('.fmt-btn').forEach(function (b) { b.classList.remove('active'); });
        btn.classList.add('active');
        currentFmt = btn.dataset.fmt;
        scheduleCompress();
      });
    });

    // ── Slider live update ────────────────────────────────────────────────────

    dimSlider.addEventListener('input', function () {
      dimVal.textContent = this.value + '%';
      scheduleCompress();
    });

    qualSlider.addEventListener('input', function () {
      qualVal.textContent = this.value;
      scheduleCompress();
    });

    autoBtn.disabled = !targetInput.value || +targetInput.value < 1;

    targetInput.addEventListener('input', function () {
      autoBtn.disabled = !this.value || +this.value < 1;
    });

    autoBtn.addEventListener('click', function () {
      var target = +targetInput.value;
      if (!target || !origBitmap) return;
      var q = autoFitQuality(target * 1024);
      qualSlider.value = Math.floor(q * 100);
      qualVal.textContent = qualSlider.value;
      compress();
    });

    // ── Image ingestion ───────────────────────────────────────────────────────

    function loadBlob(blob, name) {
      origBytes = blob.size;
      origName  = name || 'image';
      var url   = URL.createObjectURL(blob);

      createImageBitmap(blob).then(function (bmp) {
        origBitmap = bmp;
        origW = bmp.width;
        origH = bmp.height;

        origImg.src = url;
        origSizeEl.textContent = fmtBytes(origBytes);
        origDimsEl.textContent = origW + ' × ' + origH + ' px';

        showPasteLoaded(origName, origBytes, origW, origH);
        settings.classList.add('visible');
        preview.classList.add('visible');
        downloadBar.classList.add('visible');

        compress();
      });
    }

    function showPasteLoaded(name, bytes, w, h) {
      pasteZone.innerHTML =
        '<div class="paste-file-info">' +
          '<div class="paste-file-name">' + escHtml(name) + '</div>' +
          '<div class="paste-file-meta">' + fmtBytes(bytes) + ' &nbsp;·&nbsp; ' + w + ' × ' + h + ' px</div>' +
        '</div>' +
        '<button class="replace-btn" id="replace-btn">Replace</button>';
      pasteZone.classList.add('has-image');
      document.getElementById('replace-btn').addEventListener('click', resetTool);
    }

    // ── Compress ──────────────────────────────────────────────────────────────

    function compress() {
      if (!origBitmap) return;

      var scale   = +dimSlider.value / 100;
      var quality = +qualSlider.value / 100;
      var w = Math.max(1, Math.round(origW * scale));
      var h = Math.max(1, Math.round(origH * scale));

      canvas.width  = w;
      canvas.height = h;
      ctx.clearRect(0, 0, w, h);
      ctx.drawImage(origBitmap, 0, 0, w, h);

      var fmt = currentFmt;
      var dataUrl = (fmt === 'image/png')
        ? canvas.toDataURL('image/png')
        : canvas.toDataURL(fmt, quality);

      currentDataUrl = dataUrl;

      var compBytes = dataUrlBytes(dataUrl);
      var ext = fmtExt(fmt);

      compImg.src    = dataUrl;
      compSizeEl.textContent = fmtBytes(compBytes);
      compSizeEl.className   = 'panel-meta ' + sizeClass(compBytes);
      compDimsEl.textContent = w + ' × ' + h + ' px';

      dlBtn.disabled = false;
      dlBtn.textContent = 'Download  ' + escHtml(baseName(origName)) + ext;

      var saved = origBytes - compBytes;
      if (saved > 0) {
        var pct = Math.round(saved / origBytes * 100);
        savingsBadge.innerHTML = 'Saved <span>' + pct + '%</span> (' + fmtBytes(saved) + ')';
      } else {
        savingsBadge.innerHTML = '<span style="color:#f87171">+' + fmtBytes(-saved) + ' larger than original</span>';
      }
    }

    function scheduleCompress() {
      clearTimeout(debounceTimer);
      debounceTimer = setTimeout(compress, 80);
    }

    // ── Auto-fit quality (binary search) ──────────────────────────────────────

    function autoFitQuality(targetBytes) {
      if (!origBitmap) return 0.85;

      var scale = +dimSlider.value / 100;
      var w = Math.max(1, Math.round(origW * scale));
      var h = Math.max(1, Math.round(origH * scale));

      canvas.width  = w;
      canvas.height = h;
      ctx.clearRect(0, 0, w, h);
      ctx.drawImage(origBitmap, 0, 0, w, h);

      var fmt = currentFmt === 'image/png' ? 'image/jpeg' : currentFmt;
      var lo = 0.01, hi = 1.0, mid = 0.85;

      for (var i = 0; i < 20; i++) {
        mid = (lo + hi) / 2;
        var bytes = dataUrlBytes(canvas.toDataURL(fmt, mid));
        if (bytes > targetBytes) hi = mid;
        else lo = mid;
        if (hi - lo < 0.004) break;
      }

      // lo is the highest quality guaranteed to be <= targetBytes
      mid = lo;

      if (currentFmt === 'image/png') {
        currentFmt = 'image/jpeg';
        document.querySelectorAll('.fmt-btn').forEach(function (b) {
          b.classList.toggle('active', b.dataset.fmt === 'image/jpeg');
        });
      }

      return mid;
    }

    // ── Download ──────────────────────────────────────────────────────────────

    dlBtn.addEventListener('click', function () {
      if (!currentDataUrl) return;
      var a = document.createElement('a');
      a.href = currentDataUrl;
      a.download = baseName(origName) + fmtExt(currentFmt);
      a.click();
    });

    // ── Reset ─────────────────────────────────────────────────────────────────

    function resetTool() {
      origBitmap = null;
      currentDataUrl = null;
      settings.classList.remove('visible');
      preview.classList.remove('visible');
      downloadBar.classList.remove('visible');
      pasteZone.classList.remove('has-image');
      pasteZone.innerHTML =
        '<svg class="paste-icon" width="32" height="32" fill="none" stroke="currentColor" stroke-width="1.5"' +
        '     viewBox="0 0 24 24" stroke-linecap="round" stroke-linejoin="round">' +
        '  <rect x="3" y="3" width="18" height="18" rx="2" ry="2"/>' +
        '  <circle cx="8.5" cy="8.5" r="1.5"/>' +
        '  <polyline points="21 15 16 10 5 21"/>' +
        '</svg>' +
        '<div class="paste-label">Ctrl+V to paste an image</div>' +
        '<div class="paste-sub">or drag &amp; drop a file here</div>';
      pasteZone.focus();
    }

    // ── Paste ──────────────────────────────────────────────────────────────────

    document.addEventListener('paste', function (e) {
      var items = e.clipboardData && e.clipboardData.items;
      if (!items) return;
      for (var i = 0; i < items.length; i++) {
        if (items[i].type.startsWith('image/')) {
          e.preventDefault();
          var blob = items[i].getAsFile();
          var name = blob.name || ('pasted-image.' + items[i].type.split('/')[1]);
          loadBlob(blob, name);
          return;
        }
      }
    });

    // ── Drag & drop ────────────────────────────────────────────────────────────

    pasteZone.addEventListener('dragover', function (e) {
      e.preventDefault();
      pasteZone.classList.add('drag-over');
    });
    pasteZone.addEventListener('dragleave', function () {
      pasteZone.classList.remove('drag-over');
    });
    pasteZone.addEventListener('drop', function (e) {
      e.preventDefault();
      pasteZone.classList.remove('drag-over');
      var file = e.dataTransfer.files[0];
      if (file && file.type.startsWith('image/')) loadBlob(file, file.name);
    });

    pasteZone.addEventListener('click', function (e) {
      if (e.target.closest('.replace-btn')) return;
      if (origBitmap) { pasteZone.focus(); return; }
      fileInput.click();
    });

    fileInput.addEventListener('change', function () {
      var file = this.files[0];
      if (file && file.type.startsWith('image/')) loadBlob(file, file.name);
      this.value = '';
    });

    // ── Helpers ────────────────────────────────────────────────────────────────

    function dataUrlBytes(dataUrl) {
      var b64 = dataUrl.slice(dataUrl.indexOf(',') + 1);
      var padding = (b64.slice(-2) === '==' ? 2 : b64.slice(-1) === '=' ? 1 : 0);
      return Math.floor(b64.length * 3 / 4) - padding;
    }

    function fmtBytes(n) {
      if (n < 1024)       return n + ' B';
      if (n < 1024 * 1024) return (n / 1024).toFixed(1) + ' KB';
      return (n / 1024 / 1024).toFixed(2) + ' MB';
    }

    function sizeClass(bytes) {
      var kb = bytes / 1024;
      if (kb <= 900)  return 'ok';
      if (kb <= 1024) return 'warn';
      return 'over';
    }

    function fmtExt(fmt) {
      return fmt === 'image/png' ? '.png' : fmt === 'image/webp' ? '.webp' : '.jpg';
    }

    function baseName(name) {
      return name.replace(/\.[^.]+$/, '');
    }

    function escHtml(s) {
      return s.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
    }

  }());
  </script>

</body>
</html>
